# Сборка и публикация Docker-образов сервера (GPU + CPU) в GitHub Container Registry
# Триггер: push тега v* (например v0.1.0)
# Образы: ghcr.io/cascad/localvox:v0.1.0 (GPU), ghcr.io/cascad/localvox:v0.1.0-cpu (CPU)

name: Docker Release

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cpu
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-cpu:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}-cpu:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
