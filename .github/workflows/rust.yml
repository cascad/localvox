name: Rust

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libclang-dev libasound2-dev

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Test client
        run: cargo test -p live-transcribe-client-reliable

      # Server: CPU-only build (--no-default-features) для CI без GPU
      - name: Test server (CPU)
        run: cargo test -p live-transcribe-server-reliable --no-default-features
      - name: Clippy client
        run: cargo clippy -p live-transcribe-client-reliable -- -D warnings
      - name: Clippy server (CPU)
        run: cargo clippy -p live-transcribe-server-reliable --no-default-features -- -D warnings
