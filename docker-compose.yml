# LocalVox — WebSocket-сервер транскрипции (Rust + Whisper + GigaAM)
# Модели и GPU прокидываются с хоста. Ollama — на хосте (host.docker.internal:11434).
#
# Конфиг: скопируйте server-reliable/settings.docker.example.json → settings.docker.json
# и правьте локально (api_keys, TLS, use_gpu). Файл settings.docker.json в git не входит.
# CPU-only образ (Dockerfile.cpu): те же настройки, выставьте use_gpu: false и в models[].
#
# Быстрый старт: ./tools/setup.sh
#
# Образы: localvox (GPU), localvox-cpu (без видеокарты)
#   image: ghcr.io/cascad/localvox-cpu:latest   # для CPU-only
#
# Переменные: .env или export WHISPER_MODELS_HOST=./models/whisper

services:
  live-transcribe-server:
    # Локальная сборка (разработка): раскомментировать и закомментировать image выше
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    # container_name: localvox-server
    image: ghcr.io/cascad/localvox:latest
    ports:
      - "9745:9745"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - "${WHISPER_MODELS_HOST:-./models/whisper}:/models/whisper:ro"
      - "${GIGAAM_MODELS_HOST:-./models/gigaam-v3-ctc-ru}:/models/gigaam:ro"
      # Parakeet (раскомментировать + добавить в settings.docker.json → models[]):
      # - "${PARAKEET_MODELS_HOST:-./models/parakeet-tdt-0.6b-v3-int8}:/models/parakeet:ro"
      - "localvox-audio:/app/audio"
      - "./server-reliable/settings.docker.json:/app/settings.json:ro"
      # TLS (раскомментировать при wss://): добавить tls_cert_path, tls_key_path в settings
      - "./certs:/app/certs:ro"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    # host.docker.internal для доступа к Ollama на хосте (Linux: нужен Docker 20.10+)
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  localvox-audio:
